services:
  db:
    image: postgres:15-alpine
    container_name: turestaurante_db
    restart: "no"
    environment:
      POSTGRES_DB: ${DB_NAME:-turestaurante_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adminpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-turestaurante_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rest_backend
    restart: "no"
    # Instala nuevos requerimientos, aplica migraciones y levanta el servidor
    command: >
      sh -c "pip install -r requirements.txt &&
             python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=${DB_NAME:-turestaurante_db}
      - DB_USER=${DB_USER:-admin}
      - DB_PASSWORD=${DB_PASSWORD:-adminpassword}
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./rest_frontend
      dockerfile: Dockerfile
    container_name: rest_frontend
    restart: "no"
    command: sh -c "npm install && npm run dev"
    volumes:
      # Refleja tus cambios locales en el contenedor
      - ./rest_frontend:/app
      # Protege la carpeta node_modules de Linux para que no se sobreescriba con Windows
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      # URL pública con la que el frontend se comunicará con tu Django
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
